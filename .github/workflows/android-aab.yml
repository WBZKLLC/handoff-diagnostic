name: Build Android AAB (Release Signed)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - name: Install frontend dependencies (Yarn)
        working-directory: frontend
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Generate android project (Expo prebuild)
        working-directory: frontend
        run: npx expo prebuild --platform android --no-install

      - name: Enable New Architecture (Reanimated)
        working-directory: frontend
        run: echo "newArchEnabled=true" >> android/gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: frontend/android/gradle/wrapper/gradle-wrapper.properties

      - name: Set NODE_ENV for Expo/Metro
        run: echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Decode Android keystore
        working-directory: frontend/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release-key.keystore

      - name: Build signed AAB
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace \
            -Pandroid.injected.signing.store.file=release-key.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
