name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - name: Install frontend dependencies (Yarn)
        working-directory: frontend
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Generate android project (Expo prebuild)
        working-directory: frontend
        run: npx expo prebuild --platform android --no-install

      - name: Enable New Architecture (Reanimated)
        working-directory: frontend
        run: |
          echo "newArchEnabled=true" >> android/gradle.properties

      - name: Setup Java (now Gradle files exist)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: frontend/android/gradle/wrapper/gradle-wrapper.properties

      - name: Set NODE_ENV for Expo/Metro
        run: echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > release-key.keystore

      - name: Build signed AAB
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=../../release-key.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
