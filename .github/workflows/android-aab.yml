name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies (Yarn)
        working-directory: frontend
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Generate android project (Expo prebuild)
        working-directory: frontend
        run: npx expo prebuild --platform android --no-install

      - name: Setup Java (now Gradle files exist)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: frontend/android/gradle/wrapper/gradle-wrapper.properties

      - name: Build AAB
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
