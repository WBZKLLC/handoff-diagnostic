name: Build Android AAB (Release Signed)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4

      - name: Install frontend dependencies (Yarn)
        working-directory: frontend
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Generate android project (Expo prebuild)
        working-directory: frontend
        run: npx expo prebuild --platform android --no-install

      - name: Enable New Architecture (Reanimated)
        working-directory: frontend
        run: echo "newArchEnabled=true" >> android/gradle.properties

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
          cache-dependency-path: frontend/android/gradle/wrapper/gradle-wrapper.properties

      - name: Set NODE_ENV for Expo/Metro
        run: echo "NODE_ENV=production" >> $GITHUB_ENV

      - name: Decode Android keystore
        run: |
          mkdir -p frontend/android/app
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/release.keystore
          ls -l frontend/android/app/release.keystore

      - name: Verify keystore loads
        run: |
          keytool -list -keystore frontend/android/app/release.keystore \
          -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | head -n 20

      - name: Inspect keystore aliases
        working-directory: frontend/android/app
        run: |
          keytool -list -keystore release.keystore -storepass "$ANDROID_KEYSTORE_PASSWORD"
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Inject signing config into build.gradle
        working-directory: frontend/android/app
        run: |
          cat >> build.gradle << 'EOF'

          // Injected signing config for release builds
          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build signed AAB
        working-directory: frontend/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --stacktrace --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
